name: arabic_word_puzzle
description: "لعبة ألغاز الكلمات العربية - Arabic Word Puzzle Game built with Flutter, Clean Architecture, and Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ============================================================
  # State Management
  # ============================================================
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ============================================================
  # Routing
  # ============================================================
  go_router: ^14.2.0

  # ============================================================
  # Models & Code Generation
  # ============================================================
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ============================================================
  # Networking
  # ============================================================
  dio: ^5.7.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.4.0

  # ============================================================
  # Local Storage
  # ============================================================
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # ============================================================
  # Firebase
  # ============================================================
  firebase_core: ^3.4.1
  firebase_auth: ^5.2.1
  cloud_firestore: ^5.4.1
  firebase_storage: ^12.3.1
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.1
  firebase_remote_config: ^5.1.1
  firebase_messaging: ^15.0.1
  firebase_app_check: ^0.3.0+3
  cloud_functions: ^5.1.0

  # ============================================================
  # Authentication
  # ============================================================
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # ============================================================
  # Ads
  # ============================================================
  google_mobile_ads: ^5.1.0

  # ============================================================
  # In-App Purchases
  # ============================================================
  in_app_purchase: ^3.2.0

  # ============================================================
  # UI & Animations
  # ============================================================
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  confetti: ^0.7.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  particle_painter: ^0.1.0

  # ============================================================
  # Audio & Haptics
  # ============================================================
  audioplayers: ^6.1.0
  vibration: ^2.0.0

  # ============================================================
  # Notifications
  # ============================================================
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # ============================================================
  # Utilities
  # ============================================================
  get_it: ^7.7.0
  injectable: ^2.4.4
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.2
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  flutter_screenshots: ^0.1.0
  rate_my_app: ^2.2.0
  in_app_review: ^2.0.9
  app_links: ^6.3.2
  qr_flutter: ^4.1.0
  fl_chart: ^0.69.0
  smooth_page_indicator: ^1.2.0

  # ============================================================
  # RTL & Arabic
  # ============================================================
  arabic_reshaper: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.2
  injectable_generator: ^2.5.1
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.3
  bloc_test: ^9.1.7
  integration_test:
    sdk: flutter
  patrol: ^3.10.0
  very_good_analysis: ^6.0.0
  coverage: ^1.8.0
  conventional_commit: ^0.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/levels/
    - assets/images/avatars/
    - assets/images/icons/
    - assets/images/onboarding/
    - assets/sounds/
    - assets/animations/
    - assets/data/
    - assets/fonts/
    - assets/dictionary/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700

  # Enable RTL by default
  generate: true
